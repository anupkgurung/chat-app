<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Chat</title>
    <style>
        body {
            font-family: Arial;
            padding: 1rem;
        }

        #messages {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: scroll;
            padding: 10px;
        }

        #inputArea {
            margin-top: 10px;
        }

        #message {
            width: 80%;
            padding: 5px;
        }

        button {
            padding: 5px 10px;
        }
    </style>
</head>

<body>

    <h2>💬 WebSocket Chat</h2>
    <div id="messages"></div>
    <div id="inputArea">
        <input type="text" id="message" value="" placeholder="Type a message" />
        <button id='btn' onclick="sendMessage()">Send</button>
    </div>

    <script src="client.js"></script>
</body>

</html>
